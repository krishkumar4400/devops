name: ai-saas

services:
  backend:
    # image: krishkumar4400/backend 
    # container_name: backend 
    # ports:
    #   - "8000:8000"
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: backend 
    ports:
      - "5000:5000"

  db:
    image: postgres:16
    container_name: postgres_database
    environment:
      POSTGRES_PASSWORD: my_pass
      POSTGRES_USER: my_user
      POSTGRES_DB: my_db
    ports:
      - "5433:5432"
    # networks:
    #   - frontend
    #   - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine 
    depends_on: 
      - db
    container_name: redis_db
    ports:
      - "6380:6379"
    # networks:
    #   - frontend
    volumes:
      - redis_data:/data


# networks:
#   frontend:
#     driver: bridge
#   backend:
#     driver: backend

volumes:
  postgres_data:
  redis_data:

