name: e-commerce

services:
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: backend
  #   ports:
  #     - "8000:8000"

  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5431:5432"
    networks:
      - frontend
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
# docker run -it --name -e POSTGRES_PASSWORD=1234 postgres postgres

  redis:
    image: redis:7-alpine
    # depends_on:
    #   - db
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: backend


volumes:
  postgres_data:
  redis_data:
